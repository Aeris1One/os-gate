# Auto-generated by OPNsense — do not edit manually.
{% if helpers.exists('OPNsense.Gate.general') %}
config:
  bind: {{ OPNsense.Gate.general.listenAddress }}:{{ OPNsense.Gate.general.listenPort }}
  lite:
    enabled: true
    routes:
{% if helpers.exists('OPNsense.Gate.routes.route') %}
{% for route in helpers.toList('OPNsense.Gate.routes.route') %}
{% if route.enabled == '1' %}
      - host: {{ route.host }}
        backend:
{% for server in route.backend.split(',') %}
          - {{ server.strip() }}
{% endfor %}
        strategy: {{ route.strategy }}
{% if route.proxyProtocol == '1' %}
        proxyProtocol: true
{% endif %}
{% if route.fallback is defined and route.fallback != '' %}
        fallback: {{ route.fallback }}
{% endif %}
{% if route.cachePingTTL is defined and route.cachePingTTL|int > 0 %}
        cachePingTTL: {{ route.cachePingTTL }}s
{% endif %}
{% endif %}
{% endfor %}
{% endif %}
{% endif %}
